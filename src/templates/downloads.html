{% extends "base.html" %}

{% block title %}Downloads | YouTube Local Downloader{% endblock %}

{% block content %}
<section class="mx-auto max-w-6xl space-y-8">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
            <p class="text-sm uppercase tracking-[0.2em] text-red-200">Seus downloads</p>
            <h1 class="text-3xl font-black tracking-tight text-white">Histórico de Downloads</h1>
        </div>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
            <button
                type="button"
                id="downloadsRefreshButton"
                class="inline-flex w-full items-center justify-center gap-2 rounded-2xl border border-white/10 bg-[#212121] px-5 py-3 text-sm font-semibold text-white transition hover:bg-white/10 sm:w-auto"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                    <path d="M21 3v6h-6"></path>
                </svg>
                Atualizar
            </button>

            <div class="relative" id="downloadsMenuWrapper">
                <button
                    id="downloadsMenuButton"
                    type="button"
                    class="inline-flex w-full items-center justify-center gap-2 rounded-2xl border border-white/10 bg-[#212121] px-5 py-3 text-sm font-semibold text-white transition hover:bg-white/10"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <circle cx="12" cy="12" r="1"></circle>
                        <circle cx="19" cy="12" r="1"></circle>
                        <circle cx="5" cy="12" r="1"></circle>
                    </svg>
                    Ações
                </button>
                <div
                    id="downloadsMenu"
                    class="absolute right-0 z-20 mt-2 hidden min-w-[220px] overflow-hidden rounded-2xl border border-white/10 bg-[#181818] shadow-card"
                >
                    <form id="clearAllDownloadsForm" action="/downloads/clear" method="post">
                        <button
                            type="submit"
                            class="inline-flex w-full items-center gap-2 px-4 py-3 text-left text-sm font-semibold text-red-100 transition hover:bg-red-950/50"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M3 6h18"></path>
                                <path d="M8 6V4h8v2"></path>
                                <path d="m19 6-1 14H6L5 6"></path>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                            </svg>
                            Remover todo o histórico
                        </button>
                    </form>
                </div>
            </div>

            <a href="/" class="inline-flex w-full items-center justify-center gap-2 rounded-2xl border border-white/10 bg-[#212121] px-5 py-3 text-sm font-semibold text-white transition hover:bg-white/10 sm:w-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                Nova pesquisa
            </a>
        </div>
    </div>

    <div class="overflow-hidden rounded-[2rem] border border-white/10 bg-[#181818] shadow-card">
        <div id="downloadsList" class="divide-y divide-white/10"></div>
        <div id="downloadsEmptyState" class="hidden px-6 py-14 text-center">
            <p class="text-lg font-semibold text-white">Nenhum download registrado ainda.</p>
            <p class="mt-2 text-sm text-[#aaaaaa]">Assim que você iniciar um download, o status aparecerá aqui.</p>
        </div>
    </div>
</section>

<script id="downloadsPayload" type="application/json">{{ downloads_payload|tojson }}</script>
<script src="/static/js/pages/downloads.js"></script>
{% endblock %}
